version: 2

models:
  - name: dim_channels
    description: "Contains metadata about each Telegram channel."
    columns:
      - name: channel_name
        tests:
          - not_null
      - name: channel_url
        tests:
          - not_null
  - name: dim_dates
    description: "Date dimension for time-based analysis"
    columns:
      - name: date
        tests:
          - unique
          - not_null
  - name: fct_messages
    description: "Central fact table for Telegram messages"
    columns:
      - name: message_id
        tests:
          - unique
          - not_null
      - name: channel_name
        tests:
          - not_null
      - name: message_date
        tests:
          - not_null
